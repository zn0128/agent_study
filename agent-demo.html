<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent 模块演示</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;
      --text:#e2e8f0;--muted:#94a3b8;
      --blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;
      --green:#22c55e;--red:#ef4444;--yellow:#eab308;--gray:#6b7280;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg);color:var(--text);height:100vh;display:flex;
      flex-direction:column;overflow:hidden}

    /* ── Header ── */
    header{background:var(--surface);border-bottom:1px solid var(--border);
      padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .logo{width:30px;height:30px;background:linear-gradient(135deg,var(--blue),var(--purple));
      border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
    header h1{font-size:15px;font-weight:600}
    header p{font-size:11px;color:var(--muted);margin-left:auto}

    /* ── Layout ── */
    .main{display:flex;flex:1;overflow:hidden}

    /* ── Chat ── */
    .chat-panel{width:370px;min-width:370px;border-right:1px solid var(--border);
      display:flex;flex-direction:column}
    .chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .msg{display:flex;gap:8px;align-items:flex-start}
    .msg.user{flex-direction:row-reverse}
    .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:12px;flex-shrink:0}
    .msg.bot .avatar{background:linear-gradient(135deg,var(--blue),var(--purple))}
    .msg.user .avatar{background:var(--surface2)}
    .bubble{max-width:255px;padding:8px 11px;border-radius:12px;font-size:12.5px;line-height:1.55}
    .msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px}
    .msg.user .bubble{background:var(--blue);border-top-right-radius:3px}
    .typing-dots{display:flex;gap:3px;padding:4px 0}
    .dot{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite}
    .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

    .hints{padding:7px 12px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px}
    .chip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
      padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s}
    .chip:hover{background:var(--surface);color:var(--text);border-color:var(--blue)}

    .input-area{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px}
    .chat-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:7px 11px;color:var(--text);font-size:12.5px;outline:none;resize:none;
      font-family:inherit;line-height:1.4}
    .chat-input:focus{border-color:var(--blue)}
    .send-btn{background:var(--blue);border:none;border-radius:8px;width:34px;height:34px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:white;font-size:14px;transition:background .15s;flex-shrink:0}
    .send-btn:hover{background:#2563eb}.send-btn:disabled{background:var(--surface2);cursor:not-allowed}

    /* ── Right panel ── */
    .right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

    /* ── Pipeline ── */
    .pipeline-section{flex:1;padding:14px 16px;overflow-y:auto;border-bottom:1px solid var(--border)}
    .section-label{font-size:11px;font-weight:600;color:var(--muted);
      text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
    .pipeline-idle{color:var(--muted);font-size:12.5px;text-align:center;padding:36px 0}
    .pipeline-steps{display:flex;flex-direction:column;gap:5px}

    .pstep{display:flex;align-items:center;gap:9px;padding:7px 11px;
      background:var(--surface);border:1px solid var(--border);border-radius:7px;
      font-size:12px;opacity:0;transform:translateX(-8px);transition:all .28s}
    .pstep.show{opacity:1;transform:translateX(0)}
    .pstep.processing{border-color:var(--blue);background:rgba(59,130,246,.08)}
    .pstep.done{border-color:rgba(34,197,94,.4)}
    .pstep.blocked{border-color:var(--red);background:rgba(239,68,68,.08)}
    .pstep.waiting{border-color:var(--yellow);background:rgba(234,179,8,.08)}
    .pstep.skipped{opacity:.35}
    .pstep-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
    .pstep-name{font-weight:600;width:148px;flex-shrink:0;font-size:11.5px}
    .pstep-log{color:var(--muted);flex:1;font-size:11px}
    .pstep-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
    .badge-processing{background:rgba(59,130,246,.2);color:var(--blue)}
    .badge-done{background:rgba(34,197,94,.2);color:var(--green)}
    .badge-blocked{background:rgba(239,68,68,.2);color:var(--red)}
    .badge-waiting{background:rgba(234,179,8,.2);color:var(--yellow)}
    .badge-skipped{background:rgba(100,116,139,.2);color:var(--muted)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .pstep.processing .pstep-icon{animation:pulse .9s infinite}

    /* ── Modules grid ── */
    .modules-section{padding:10px 16px 12px;flex-shrink:0;border-top:1px solid var(--border)}
    .layer-rows{display:flex;flex-direction:column;gap:5px}
    .layer-row{display:flex;align-items:center;gap:8px}
    .layer-name{font-size:10px;color:var(--muted);width:60px;text-align:right;flex-shrink:0}
    .layer-chips{display:flex;flex-wrap:wrap;gap:3px}
    .mchip{padding:3px 7px;border-radius:5px;font-size:11px;font-weight:500;
      cursor:pointer;transition:all .2s;border:1px solid transparent;user-select:none}
    .mchip.core{background:rgba(59,130,246,.1);color:#93c5fd;border-color:rgba(59,130,246,.2)}
    .mchip.knowledge{background:rgba(139,92,246,.1);color:#c4b5fd;border-color:rgba(139,92,246,.2)}
    .mchip.action{background:rgba(249,115,22,.1);color:#fdba74;border-color:rgba(249,115,22,.2)}
    .mchip.execution{background:rgba(34,197,94,.1);color:#86efac;border-color:rgba(34,197,94,.2)}
    .mchip.reliability{background:rgba(239,68,68,.1);color:#fca5a5;border-color:rgba(239,68,68,.2)}
    .mchip.framework{background:rgba(107,114,128,.1);color:#9ca3af;border-color:rgba(107,114,128,.2)}
    .mchip.core.active{background:rgba(59,130,246,.3);border-color:var(--blue);box-shadow:0 0 7px rgba(59,130,246,.5);color:#fff}
    .mchip.knowledge.active{background:rgba(139,92,246,.3);border-color:var(--purple);box-shadow:0 0 7px rgba(139,92,246,.5);color:#fff}
    .mchip.action.active{background:rgba(249,115,22,.3);border-color:var(--orange);box-shadow:0 0 7px rgba(249,115,22,.5);color:#fff}
    .mchip.execution.active{background:rgba(34,197,94,.3);border-color:var(--green);box-shadow:0 0 7px rgba(34,197,94,.5);color:#fff}
    .mchip.reliability.active{background:rgba(239,68,68,.3);border-color:var(--red);box-shadow:0 0 7px rgba(239,68,68,.5);color:#fff}
    .mchip.framework.active{background:rgba(107,114,128,.3);border-color:var(--gray);box-shadow:0 0 7px rgba(107,114,128,.4);color:#fff}

    /* ── Tooltip ── */
    .tooltip{display:none;position:fixed;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;padding:10px 13px;font-size:12px;max-width:280px;z-index:999;
      pointer-events:none;line-height:1.55;box-shadow:0 4px 16px rgba(0,0,0,.4)}
    .tooltip.show{display:block}
    .tt-name{font-weight:700;margin-bottom:5px}
    .tt-desc{color:var(--muted)}

    /* ── Modal ── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
      z-index:200;align-items:center;justify-content:center}
    .overlay.show{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:22px;max-width:380px;width:90%}
    .modal-title{font-weight:700;margin-bottom:9px;font-size:14px}
    .modal-body{color:var(--muted);font-size:12.5px;line-height:1.6;margin-bottom:16px}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end}
    .btn{padding:6px 16px;border-radius:6px;font-size:12.5px;cursor:pointer;border:none;font-family:inherit}
    .btn-p{background:var(--blue);color:#fff}.btn-s{background:var(--surface2);color:var(--text)}

    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <h1>AI Agent 模块演示</h1>
  <p>发送不同类型的消息，观察各模块的运作过程</p>
</header>

<div class="main">

  <!-- ── 左：对话区 ── -->
  <div class="chat-panel">
    <div class="chat-messages" id="msgs">
      <div class="msg bot">
        <div class="avatar">🤖</div>
        <div class="bubble">
          你好！我是一个 AI Agent 演示系统。<br><br>
          发送消息后，右侧面板会<strong>实时展示</strong>各模块的处理过程，
          底部模块栏也会同步点亮。<br><br>
          试试下方的示例 ↓
        </div>
      </div>
    </div>

    <div class="hints">
      <div class="chip" onclick="fill('什么是 Function Call？')">💡 什么是 Function Call？</div>
      <div class="chip" onclick="fill('帮我搜索最新 AI 新闻')">🔍 搜索最新 AI 新闻</div>
      <div class="chip" onclick="fill('制定一份 AI Agent 学习方案')">📋 制定学习方案</div>
      <div class="chip" onclick="fill('你之前提到的 RAG 是什么')">🧠 你之前提到的 RAG</div>
      <div class="chip" onclick="fill('帮我把这份报告发给团队')">📤 发送报告给团队</div>
      <div class="chip" onclick="fill('删除所有数据库记录')">⚠️ 删除数据库记录</div>
    </div>

    <div class="input-area">
      <textarea class="chat-input" id="input" placeholder="输入消息… (Enter 发送)"
        rows="2" onkeydown="onKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
    </div>
  </div>

  <!-- ── 右面板 ── -->
  <div class="right-panel">

    <!-- 管道 -->
    <div class="pipeline-section">
      <div class="section-label">⚡ 实时处理管道</div>
      <div id="pipeline">
        <div class="pipeline-idle">← 发送消息后，这里将展示 Agent 的完整处理过程</div>
      </div>
    </div>

    <!-- 模块状态 -->
    <div class="modules-section">
      <div class="section-label" style="margin-bottom:8px">
        📦 模块状态
        <span style="font-size:10px;font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0">
          &nbsp;— 鼠标悬停查看定义，高亮表示本轮已激活
        </span>
      </div>
      <div class="layer-rows" id="layerRows"></div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tip">
  <div class="tt-name" id="tipName"></div>
  <div class="tt-desc" id="tipDesc"></div>
</div>

<!-- Human-in-the-loop 确认弹窗 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">⚠️ Human-in-the-loop：需要您的确认</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-s" onclick="decide(false)">取消操作</button>
      <button class="btn btn-p" onclick="decide(true)">确认执行</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  模块定义
// ════════════════════════════════════════════════════
const MODULES = {
  agent:         { name:'Agent',              layer:'core',        icon:'🤖', desc:'智能体，具备自主决策能力的智能软件。能感知输入、规划行动、调用工具并与用户持续交互，是整个系统的主体。' },
  llm:           { name:'LLM',                layer:'core',        icon:'🧠', desc:'大语言模型，Agent 的核心推理引擎，负责理解语言、分析意图、生成文本。所有模块的最终输出都需经过 LLM 整合。' },
  prompt:        { name:'Prompt',             layer:'core',        icon:'✍️', desc:'提示词，输入给 LLM 的指令与上下文，引导模型输出期望结果。系统 Prompt 定义 Agent 的角色、能力范围和行为规则。' },
  context:       { name:'Context',            layer:'core',        icon:'📄', desc:'上下文，LLM 单次推理时能看到的全部文本，包括系统指令、对话历史、检索内容、工具调用结果等，有长度上限（Context Window）。' },
  planning:      { name:'Planning / Reasoning',layer:'core',       icon:'💭', desc:'规划与推理，让 Agent 先思考再行动。CoT（链式思考）逐步推导，ReAct 交替执行"推理→行动→观察"，Plan-and-Execute 先制定完整计划再执行。' },
  memory:        { name:'Memory',             layer:'knowledge',   icon:'💾', desc:'记忆，使 Agent 能跨对话存储和检索历史信息。短期记忆存于 Context，长期记忆持久化到向量数据库，每次回答前检索注入。' },
  rag:           { name:'RAG',                layer:'knowledge',   icon:'📚', desc:'检索增强生成，先从外部知识库检索与问题语义相关的片段，再将片段+问题一同输入 LLM，大幅减少幻觉、提升准确性，且知识可随时更新。' },
  tools:         { name:'Tools',              layer:'action',      icon:'🔧', desc:'工具，Agent 可调用的外部能力实体：搜索引擎、代码解释器、文件系统、邮件服务等。Function Call 是调用的"动作"，Tools 是被调用的"对象"。' },
  function_call: { name:'Function Call',      layer:'action',      icon:'⚡', desc:'函数调用，LLM 根据上下文判断需要哪个工具，自动输出符合函数签名的结构化 JSON 参数，Agent 框架捕获后执行对应工具并将结果回传。' },
  mcp:           { name:'MCP',                layer:'action',      icon:'🔌', desc:'模型上下文协议，Anthropic 提出的工具集成标准。开发者按 MCP 规范包装任意 API/数据库，Agent 通过统一协议发现并调用，无需逐一适配。' },
  skills:        { name:'Skills',             layer:'action',      icon:'⭐', desc:'技能，Agent 具备的可复用能力单元，是封装好的专业能力（如"数据分析"、"代码审查"），可视为预打包的 Workflow，随需激活。' },
  workflow:      { name:'Workflow',           layer:'execution',   icon:'🔄', desc:'工作流，人为预先定义的标准化执行步骤（硬编码），将复杂任务分解为可重复的结构化流程。与 Planning 的区别：Workflow 是固定流程，Planning 是运行时动态生成的计划。' },
  subagent:      { name:'SubAgent',           layer:'execution',   icon:'👾', desc:'子智能体，当任务超出单 Agent 能力时，由主 Agent 委派的专项执行角色。SubAgent 拥有独立的上下文和工具集，完成后将最终结果返回主对话。' },
  orchestrator:  { name:'Orchestrator',       layer:'execution',   icon:'🎯', desc:'编排器，多 Agent 系统的调度中枢，负责任务分解、SubAgent 调度、跨 Agent 上下文传递和结果聚合。是管理 SubAgent 的上层角色。' },
  guardrails:    { name:'Guardrails',         layer:'reliability', icon:'🛡️', desc:'护栏，分输入和输出两道关卡：输入端拦截提示词注入和越权请求；输出端检测幻觉、过滤敏感信息、阻断高风险操作。是 Agent 安全的自动化防线。' },
  hitl:          { name:'Human-in-the-loop',  layer:'reliability', icon:'👤', desc:'人工介入，在高风险、不可逆或低置信度节点，自动暂停执行并请求人工确认或纠偏。Guardrails 是机器自动拦截，Human-in-the-loop 是将决策权交还给人。' },
  evaluation:    { name:'Evaluation',         layer:'reliability', icon:'📊', desc:'评估，对 Agent 输出进行持续质量度量：任务完成率、工具调用准确率、推理路径合理性、安全合规性。为优化 Prompt/Tools/Workflow 提供数据闭环。' },
  langchain:     { name:'Langchain',          layer:'framework',   icon:'⛓️', desc:'LLM 编程框架，提供 Agent、Memory、Tools、Chain 等组件的标准化实现，简化 AI 应用开发。属于实现框架层，是构建 Agent 的"工具箱"，非 Agent 本身的运行模块。' },
};

const LAYERS = [
  { id:'core',        label:'核心概念', ids:['agent','llm','prompt','context','planning'] },
  { id:'knowledge',   label:'记忆知识', ids:['memory','rag'] },
  { id:'action',      label:'行动能力', ids:['tools','function_call','mcp','skills'] },
  { id:'execution',   label:'执行结构', ids:['workflow','subagent','orchestrator'] },
  { id:'reliability', label:'可靠性',   ids:['guardrails','hitl','evaluation'] },
  { id:'framework',   label:'框架',     ids:['langchain'] },
];

// ════════════════════════════════════════════════════
//  管道场景定义
// ════════════════════════════════════════════════════
const PIPELINES = {
  dangerous:[
    {mod:'guardrails', status:'blocked', log:'检测到高风险指令：不可逆破坏性操作，已终止', icon:'🛡️'},
  ],
  knowledge:[
    {mod:'guardrails',    status:'done',    log:'输入安全检查通过，无注入风险',                         icon:'🛡️'},
    {mod:'prompt',        status:'done',    log:'构建系统提示词 + 用户问题',                           icon:'✍️'},
    {mod:'context',       status:'done',    log:'加载对话历史，Context 窗口已用 14%',                  icon:'📄'},
    {mod:'memory',        status:'done',    log:'检索长期记忆，命中 2 条相关历史',                     icon:'💾'},
    {mod:'rag',           status:'done',    log:'知识库向量检索，召回 3 个片段（相似度 > 0.87）',       icon:'📚'},
    {mod:'planning',      status:'done',    log:'CoT 推理：问题分解 → 知识整合 → 组织答案',            icon:'💭'},
    {mod:'llm',           status:'done',    log:'生成回答，输入 1 280 tokens，输出 420 tokens',        icon:'🧠'},
    {mod:'guardrails',    status:'done',    log:'输出检查通过，无幻觉 / 敏感内容',                     icon:'🛡️'},
    {mod:'evaluation',    status:'done',    log:'质量评分 0.91 | 相关性：高 | 准确性：高',             icon:'📊'},
  ],
  tool_use:[
    {mod:'guardrails',    status:'done',    log:'输入检查通过',                                        icon:'🛡️'},
    {mod:'prompt',        status:'done',    log:'构建含工具描述的系统提示词',                           icon:'✍️'},
    {mod:'context',       status:'done',    log:'加载对话历史 + 已注册工具列表',                       icon:'📄'},
    {mod:'planning',      status:'done',    log:'ReAct 推理：判断需要调用外部工具',                    icon:'💭'},
    {mod:'function_call', status:'done',    log:'LLM 输出：web_search(query="...")',                   icon:'⚡'},
    {mod:'mcp',           status:'done',    log:'MCP 协议路由至已注册的搜索服务',                      icon:'🔌'},
    {mod:'tools',         status:'done',    log:'搜索工具执行完毕，返回 8 条结果',                     icon:'🔧'},
    {mod:'llm',           status:'done',    log:'整合工具结果，生成最终回答',                          icon:'🧠'},
    {mod:'guardrails',    status:'done',    log:'输出检查通过',                                        icon:'🛡️'},
    {mod:'evaluation',    status:'done',    log:'质量评分 0.88 | 工具调用准确率 100%',                 icon:'📊'},
  ],
  complex_task:[
    {mod:'guardrails',    status:'done',    log:'输入检查通过',                                        icon:'🛡️'},
    {mod:'prompt',        status:'done',    log:'构建复杂任务提示词',                                  icon:'✍️'},

const KNOWLEDGE_MAP = {
  'function call': `<strong>Function Call（函数调用）</strong> 是 Agent 使用工具的核心机制。<br><br>当 LLM 判断需要调用工具时，它输出一段结构化 JSON，而非普通文本：<br><code>{"tool":"web_search","args":{"query":"..."}}</code><br><br>Agent 框架捕获指令 → 执行工具 → 将结果回传给 LLM → LLM 据此生成最终答案。<br><br><strong>与 MCP 的区别</strong>：Function Call 是"调用动作"，MCP 是"工具注册标准"。<br><strong>与 Tools 的区别</strong>：Function Call 是遥控器，Tools 是被遥控的电器。`,
  'rag': `<strong>RAG（检索增强生成）</strong> 解决了 LLM 知识截止和幻觉的问题。<br><br>工作流程：<br>① 用户问题 → 向量化<br>② 在知识库中语义检索相关片段<br>③ 片段 + 原始问题一起输入 LLM<br>④ LLM 基于真实文档生成有据可查的回答<br><br><strong>核心优势</strong>：减少幻觉（答案有文档支撑）、知识可随时更新（无需重训模型）、输出可溯源。`,
  'memory': `<strong>Memory（记忆）</strong> 赋予 Agent 跨对话的连续性。<br><br>分两类：<br>• <strong>短期记忆</strong>：当前 Context 窗口内的对话历史，会话结束即失效<br>• <strong>长期记忆</strong>：持久化到向量数据库，可跨会话检索，支持"记住用户偏好"等场景<br><br>每次回答前，Memory 模块检索与当前问题相关的历史，注入 Context，让 Agent 产生"记忆感"。`,
  'mcp': `<strong>MCP（模型上下文协议）</strong> 是 Anthropic 提出的工具集成标准。<br><br>解决的问题：此前每个工具都需单独适配每个 Agent，成本极高。<br><br>MCP 提供统一接口：<br>• 开发者按 MCP 规范包装任意工具 / API<br>• Agent 通过统一协议发现并调用所有工具<br><br>类比：USB 标准 —— 任何设备遵循 USB 规范，就能插入任意支持 USB 的主机。`,
  'planning': `<strong>Planning / Reasoning（规划与推理）</strong> 是 Agent 的决策核心。<br><br>主要模式：<br>• <strong>CoT</strong>（链式思考）：让模型逐步推理，线性思考链<br>• <strong>ReAct</strong>：推理 + 行动交替，观察工具结果后继续推理<br>• <strong>Plan-and-Execute</strong>：先生成完整计划，再逐步执行<br><br><strong>与 Workflow 的关键区别</strong>：Workflow 是人预先写死的流程；Planning 是 Agent 运行时动态生成的计划。`,
  'guardrails': `<strong>Guardrails（护栏）</strong> 是 Agent 安全的自动化防线，分两道关卡：<br><br>• <strong>输入护栏</strong>：拦截提示词注入攻击、越权请求、违规内容<br>• <strong>输出护栏</strong>：检测幻觉、过滤敏感信息（个人隐私、内部数据）、阻断高风险操作<br><br>没有 Guardrails 的 Agent 就像没有刹车的汽车——连接真实世界后，一个错误输出可能造成不可逆的真实损害。`,
  'orchestrator': `<strong>Orchestrator（编排器）</strong> 是多 Agent 系统的调度中枢。<br><br>核心职责：<br>① 将大任务分解为子任务<br>② 决定哪个 SubAgent 执行哪件事（串行 / 并行）<br>③ 在 Agent 间传递必要的上下文<br>④ 聚合各 SubAgent 输出，合并为最终结果<br>⑤ 某 SubAgent 失败时决定重试 / 跳过 / 终止<br><br>列表中只有 SubAgent，Orchestrator 是管理它的上层角色。`,
  'human': `<strong>Human-in-the-loop（人工介入）</strong> 定义了哪些节点需要人来确认或纠偏。<br><br>三种介入时机：<br>• <strong>执行前审批</strong>：高风险、不可逆操作（如批量发邮件）<br>• <strong>过程中纠偏</strong>：Agent 置信度低或陷入循环时<br>• <strong>结果后审核</strong>：输出影响重大决策（如合同草稿）<br><br><strong>与 Guardrails 的区别</strong>：Guardrails 是机器自动拦截，Human-in-the-loop 是将决策权交还给人。`,
  'evaluation': `<strong>Evaluation（评估）</strong> 是 Agent 持续改进的闭环机制。<br><br>度量维度：<br>• 任务完成率：目标是否达成<br>• 工具调用准确率：选对工具了吗？参数正确吗？<br>• 推理路径质量：中间步骤是否合理<br>• 延迟与成本：token 消耗、响应时间<br>• 安全合规：有无违规输出<br><br>评估结果反馈给开发者，驱动 Prompt / Tools / Workflow 的迭代优化。`,
  'skills': `<strong>Skills（技能）</strong> 是 Agent 具备的可复用能力单元。<br><br>可以理解为封装好的专业能力模块，如"数据分析"、"代码审查"、"多语言翻译"。<br><br>与其他概念的关系：<br>• Skills ≈ 打包好的 Workflow（预定义的执行步骤）<br>• Skills 通过 Function Call 被激活<br>• 不同 Agent 可共享同一套 Skills<br><br>Skills 的存在让 Agent 能力可以像"插件"一样复用和扩展。`,
  'subagent': `<strong>SubAgent（子智能体）</strong> 是主 Agent 委派的专项执行角色。<br><br>触发条件：任务过于复杂，超出单 Agent 的能力边界（如需要同时进行网络搜索 + 代码执行 + 文档分析）。<br><br>工作方式：<br>① 主 Agent 将子任务 + 必要上下文传给 SubAgent<br>② SubAgent 拥有独立的 Context 和工具集<br>③ SubAgent 完成后将最终结果返回主对话<br><br>SubAgent 本身也可以是完整的 Agent，支持嵌套。`,
  'langchain': `<strong>Langchain</strong> 是最流行的 LLM 编程框架之一。<br><br>提供了大量开箱即用的组件：<br>• Agent / AgentExecutor（主控循环）<br>• Memory（短期 + 长期记忆实现）<br>• Tools（常用工具封装）<br>• Chain（工作流编排）<br>• Retriever（RAG 检索集成）<br><br><strong>定位说明</strong>：Langchain 是构建 Agent 的"工具箱"（框架层），与 Agent、LLM 等概念不在同一层级，因此单独归为实现框架层。`,
  'workflow': `<strong>Workflow（工作流）</strong> 是预先定义的标准化执行步骤（硬编码）。<br><br>将复杂任务分解为可重复、可预测的结构化流程，如：<br>用户提问 → 检索知识库 → 生成草稿 → 格式校验 → 输出<br><br><strong>与 Planning 的核心区别</strong>：<br>• Workflow 是人在开发时写死的流程，执行路径固定<br>• Planning 是 Agent 在运行时动态生成的计划，路径灵活<br><br>Workflow 提供稳定性和可审计性，Planning 提供灵活性和自适应性。`,
};

function getResponse(scenario, input) {
  if (scenario === 'dangerous') {
    return `⚠️ <strong>请求已被 Guardrails 拦截</strong><br><br>检测到高风险操作指令，执行已终止。<br><br><strong>触发原因</strong>：该操作属于不可逆的破坏性行为，违反 Agent 安全策略。Guardrails 在输入阶段即阻断，后续模块均未被激活。<br><br>这正是 Guardrails 模块的价值所在——在错误指令执行之前就拦截，而非事后补救。`;
  }
  if (scenario === 'tool_use') {
    return `🔍 <strong>工具调用完成</strong><br><br>处理链路：Function Call → MCP 协议路由 → 搜索工具执行<br><br><strong>检索结果摘要</strong><br>• 找到 8 条相关结果，来源：权威媒体 & 官方渠道<br>• 检索耗时：1.2s<br><br><strong>整合结论</strong>：该领域正处于快速发展阶段，主要进展集中在多模态能力和 Agent 自主性两个方向。<br><br><em>以上为模拟结果，实际部署中将返回真实检索数据。</em>`;
  }
  if (scenario === 'complex_task') {
    return `📋 <strong>复杂任务执行完成</strong><br><br>Orchestrator 调度 2 个 SubAgent 并行处理，结合 Skills + Workflow 生成完整方案：<br><br><strong>执行摘要</strong><br>• SubAgent-1：信息收集完成（3.1s）<br>• SubAgent-2：数据分析完成（2.7s）<br>• 主 Agent：整合输出，生成结构化报告<br><br><strong>方案要点</strong><br>• 阶段一：基础建设（第 1–2 周）<br>• 阶段二：能力扩展（第 3–4 周）<br>• 阶段三：优化迭代（持续进行）<br><br>综合评分：94 分 | 完整性：高 | 可执行性：高`;
  }
  if (scenario === 'memory_recall') {
    return `🧠 <strong>从 Memory 中检索到相关内容</strong><br><br>命中 4 条历史对话记录，以下是整合摘要：<br><br>我们在此前的对话中讨论过 AI Agent 的完整模块体系，按层级划分为：<br>• <strong>核心概念</strong>：Agent、LLM、Prompt、Context、Planning<br>• <strong>记忆与知识</strong>：Memory、RAG<br>• <strong>行动能力</strong>：Tools、Function Call、MCP、Skills<br>• <strong>执行结构</strong>：Workflow、SubAgent、Orchestrator<br>• <strong>可靠性</strong>：Guardrails、Human-in-the-loop、Evaluation<br><br>如需了解某个具体模块，可以直接提问。`;
  }
  if (scenario === 'knowledge') {
    const lower = input.toLowerCase();
    for (const [key, resp] of Object.entries(KNOWLEDGE_MAP)) {
      if (lower.includes(key)) return resp;
    }
    return `这是一个关于 AI Agent 技术的问题。<br><br>AI Agent 是能够感知环境、自主决策并执行动作的智能系统，由多个协同工作的模块构成：LLM 负责推理，Planning 制定计划，Tools 执行外部操作，Memory 与 RAG 提供知识支持，Guardrails 确保安全可控。<br><br>你可以针对具体模块提问（如"什么是 RAG"、"Guardrails 怎么工作"）来获取详细解释。`;
  }
  return `收到你的消息。右侧面板展示了本次处理涉及的各个模块。<br><br>你可以尝试以下类型的消息来触发不同处理路径：<br>• <strong>知识问答</strong>（"XXX 是什么"）→ 激活 RAG + Memory<br>• <strong>工具调用</strong>（"帮我搜索…"）→ 激活 Function Call + MCP + Tools<br>• <strong>复杂任务</strong>（"制定方案…"）→ 激活 Orchestrator + SubAgent<br>• <strong>危险操作</strong>（"删除…"）→ Guardrails 拦截<br>• <strong>发送操作</strong>（"帮我发送…"）→ 触发 Human-in-the-loop`;
}

let busy = false;
let humanResolve = null;

// ════════════════════════════════════════════════════

function initGrid() {
  const el = document.getElementById('layerRows');
  el.innerHTML = LAYERS.map(layer => `
    <div class="layer-row">
      <div class="layer-name">${layer.label}</div>
      <div class="layer-chips">
        ${layer.ids.map(id => `
          <div class="mchip ${layer.id}" id="chip-${id}"
            onclick="showDetail('${id}')"
            onmouseenter="showTip(event,'${id}')"
            onmouseleave="hideTip()">
            ${MODULES[id].icon} ${MODULES[id].name}
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function setActive(id, on) {
  const c = document.getElementById('chip-' + id);
  if (c) on ? c.classList.add('active') : c.classList.remove('active');
}
function resetAll() {
  Object.keys(MODULES).forEach(id => setActive(id, false));
}
function activateAll(ids) {
  ids.forEach(id => setActive(id, true));
}

function showTip(e, id) {
  const m = MODULES[id];
  document.getElementById('tipName').textContent = m.icon + ' ' + m.name;
  document.getElementById('tipDesc').textContent = m.desc;
  const tip = document.getElementById('tip');
  const r = e.target.getBoundingClientRect();
  tip.style.left = Math.min(r.left, window.innerWidth - 295) + 'px';
  tip.style.top  = (r.top - 8) + 'px';
  tip.style.transform = 'translateY(-100%)';
  tip.classList.add('show');
}
function hideTip() { document.getElementById('tip').classList.remove('show'); }
function showDetail(id) { /* tooltip already sufficient */ }

// ════════════════════════════════════════════════════
//  管道动画
// ════════════════════════════════════════════════════
const BADGE_TEXT = { processing:'处理中', done:'完成', blocked:'已拦截', waiting:'等待确认', skipped:'已跳过' };

async function runPipeline(scenario) {
  resetAll();
  setActive('agent', true);
  setActive('langchain', true);

  const steps = PIPELINES[scenario];
  const wrap = document.getElementById('pipeline');
  wrap.innerHTML = '<div class="pipeline-steps" id="psteps"></div>';
  const container = document.getElementById('psteps');

  for (let i = 0; i < steps.length; i++) {
    const s = steps[i];
    const uid = s.mod + '_' + i;
    const el = document.createElement('div');
    el.className = 'pstep';
    el.id = 'ps_' + uid;
    el.innerHTML = `
      <span class="pstep-icon">${s.icon}</span>
      <span class="pstep-name">${MODULES[s.mod].name}</span>
      <span class="pstep-log" id="pl_${uid}">处理中…</span>
      <span class="pstep-badge badge-processing" id="pb_${uid}">处理中</span>`;
    container.appendChild(el);

    await sleep(40);
    el.classList.add('show', 'processing');
    setActive(s.mod, true);

    const delay = s.status === 'blocked' ? 750 : s.status === 'waiting' ? 600 : 280 + Math.random() * 380;
    await sleep(delay);

    el.classList.remove('processing');
    el.classList.add(s.status);
    document.getElementById('pl_' + uid).textContent = s.log;
    const badge = document.getElementById('pb_' + uid);
    badge.className = 'pstep-badge badge-' + s.status;
    badge.textContent = BADGE_TEXT[s.status] || '完成';

    if (s.status === 'blocked' || s.status === 'waiting') break;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ════════════════════════════════════════════════════
//  发送 & 回复
// ════════════════════════════════════════════════════
function detect(input) {
  if (/删除|清空|格式化|攻击|破坏|注入|hack/i.test(input))         return 'dangerous';
  if (/搜索|查找|查询|天气|股价|新闻|实时|最新/i.test(input))       return 'tool_use';
  if (/分析|报告|制定|规划|方案|总结|研究|调研/i.test(input))        return 'complex_task';
  if (/记得|之前|上次|你说过|历史|我们|提到/i.test(input))           return 'memory_recall';
  if (/发送|提交|确认|执行|部署|发布/i.test(input))                  return 'human_loop';
  if (/是什么|什么是|介绍|解释|怎么|如何|原理|区别|定义|概念/i.test(input)) return 'knowledge';
  return 'default';
}

async function send() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text || busy) return;
  busy = true;
  inp.value = '';
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  const tid = addTyping();
  const scenario = detect(text);
  await runPipeline(scenario);
  removeEl(tid);

  if (scenario === 'human_loop') {
    document.getElementById('modalBody').innerHTML =
      `Agent 已准备好执行以下操作：<br><br>
       <strong>发送邮件至：team@company.com</strong><br>
       主题：[报告] ${text}<br><br>
       此操作执行后将立即发送，<strong>无法撤销</strong>。<br>是否确认？`;
    document.getElementById('overlay').classList.add('show');
    await new Promise(r => { humanResolve = r; });
  } else {
    await sleep(180);
    addMsg('bot', getResponse(scenario, text));
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

function decide(confirmed) {
  document.getElementById('overlay').classList.remove('show');

  // 完结 HITL 步骤
  const steps = document.querySelectorAll('.pstep.waiting');
  steps.forEach(el => {
    el.classList.remove('waiting');
    el.classList.add(confirmed ? 'done' : 'blocked');
    const badge = el.querySelector('.pstep-badge');
    badge.className = 'pstep-badge badge-' + (confirmed ? 'done' : 'blocked');
    badge.textContent = confirmed ? '已确认' : '已取消';
    el.querySelector('.pstep-log').textContent = confirmed
      ? '用户已确认，继续执行发送操作'
      : '用户选择取消，操作已终止';
  });

  const reply = confirmed
    ? `✅ <strong>操作已执行</strong><br><br>邮件已通过 MCP 协议调用邮件服务发送成功。<br><br>这是 <strong>Human-in-the-loop</strong> 的典型场景：不可逆的高风险操作触发暂停 → 人工确认 → 继续执行。这是对 Guardrails 自动拦截的有效补充——机器无法判断"是否真的需要发送"时，交由人来决策。`
    : `❌ <strong>操作已取消</strong><br><br>Human-in-the-loop 介入，用户选择终止。Agent 不会执行任何发送动作。<br><br>这正是人工介入机制的价值：在执行不可逆操作前给人一次否决权。`;

  addMsg('bot', reply);
  if (humanResolve) { humanResolve(); humanResolve = null; }
  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

// ── DOM helpers ──
function addMsg(role, html) {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = `<div class="avatar">${role === 'bot' ? '🤖' : '👤'}</div>
    <div class="bubble">${html}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function addTyping() {
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="avatar">🤖</div>
    <div class="bubble"><div class="typing-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
  return 'typing';
}
function removeEl(id) { const e = document.getElementById(id); if (e) e.remove(); }
function fill(t) { document.getElementById('input').value = t; document.getElementById('input').focus(); }
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

initGrid();
</script>
